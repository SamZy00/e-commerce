<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-commerce</title>
</head>
<link rel="stylesheet" href="css/style.css">
<body>
    

    <nav>
        <ul>
            <a href="index.html"><button>Register</button></a>
        </ul>
    </nav>


<form action="login.html" method="POST">
    <div class="container-login">
        <div>
            <div class="login-cont">
                <img src="img/e-commerce-logo.png" alt="">
                <h4><strong>Shop With Samzy</strong></h4><p></p>
                
                <p>Email<span style="color: red;">*</span></p>
                <input type="email" id="email" placeholder="@example.com" required><p></p>

                <p>Password<span style="color: red;">*</span></p>
                <input type="password" id="login-pass" placeholder="******" required>

                <input type="checkbox"><span>Remember Me</span>

               <a href="#"><label for="text">Forgot Password?</label></a> 
            </div>
        </div>
    </div>
</form>
</body>
</html>

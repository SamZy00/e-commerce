<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=nav, initial-scale=1.0">
    <title>Document</title>
</head>
<link rel="stylesheet" href="css/style.css">
<body >
    


<div><a href="login.html"><button>Login</button></a></div>

<form action="index.html" method="POST">
    <div class="container-login">
        <div>
            <div class="login-cont">
                <img src="img/e-commerce-logo.png" alt="">
                <h4><strong>Register With Us</strong></h4><p></p>
                
                <p>Full Name<span style="color: red;">*</span></p>
                <input type="text" id="fname" placeholder="Adeniyi Samuel" required><p></p>

                <p>Email<span style="color: red;">*</span></p>
                <input type="email" id="email" placeholder="@example.com" required><p></p>

                <p>Phone No<span style="color: red;">*</span></p>
                <input type="number" id="phone" required><p></p>

                <p>Password<span style="color: red;">*</span></p>
                <input type="password" id="pass" placeholder="******" required>

                <button><a href="login.html" style="color: white; text-decoration: none;">Sign Up</a></button>

            </div>
        </div>
    </div>
</form>
</body>
</html>
